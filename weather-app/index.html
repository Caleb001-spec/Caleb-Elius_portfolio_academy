<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App — Caleb Elius</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .weather-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: #ccc;
            margin-bottom: 2rem;
            font-size: 0.8rem;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        button {
            background: #ff8c00;
            border: none;
            padding: 0 1.5rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            background: #ff9e2c;
        }

        .weather-info {
            text-align: center;
            color: white;
        }

        .city-name {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .temp {
            font-size: 4rem;
            font-weight: bold;
            margin: 1rem 0;
        }

        .condition {
            font-size: 1.2rem;
            text-transform: capitalize;
            margin-bottom: 1rem;
        }

        .details {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .detail {
            text-align: center;
        }

        .detail-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .loading {
            color: white;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <h1>??? Weather App</h1>
        <div class="sub">Built by Caleb Elius — with bugs fixed along the way</div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="Nairobi">
            <button id="searchBtn">Search</button>
        </div>

        <div class="loading" id="loading">Loading weather data...</div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName">Nairobi</div>
            <div class="temp" id="temp">--°C</div>
            <div class="condition" id="condition">--</div>
            <div class="details">
                <div class="detail">
                    <div class="detail-label">?? Humidity</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail">
                    <div class="detail-label">?? Wind Speed</div>
                    <div class="detail-value" id="wind">-- km/h</div>
                </div>
                <div class="detail">
                    <div class="detail-label">??? Feels Like</div>
                    <div class="detail-value" id="feelsLike">--°C</div>
                </div>
            </div>
        </div>

        <div class="error" id="errorMsg">City not found. Try again!</div>
    </div>

    <script>
        // API key - using a free OpenWeatherMap demo key
        // Note: For full features, sign up for free at openweathermap.org
        const API_KEY = "bd5e378503939ddaee76f12ad7a97608"; // Demo key - works for basic cities
        
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const loading = document.getElementById('loading');
        const weatherInfo = document.getElementById('weatherInfo');
        const errorMsg = document.getElementById('errorMsg');
        
        const cityNameEl = document.getElementById('cityName');
        const tempEl = document.getElementById('temp');
        const conditionEl = document.getElementById('condition');
        const humidityEl = document.getElementById('humidity');
        const windEl = document.getElementById('wind');
        const feelsLikeEl = document.getElementById('feelsLike');

        async function getWeather(city) {
            // Show loading
            loading.style.display = 'block';
            weatherInfo.style.display = 'none';
            errorMsg.style.display = 'none';
            
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`;
                const response = await fetch(url);
                
                // BUG I FIXED: Forgot to check response.ok - had to learn this the hard way!
                if (!response.ok) {
                    throw new Error('City not found');
                }
                
                const data = await response.json();
                
                // Update UI with data
                cityNameEl.textContent = data.name;
                tempEl.textContent = Math.round(data.main.temp) + '°C';
                conditionEl.textContent = data.weather[0].description;
                humidityEl.textContent = data.main.humidity + '%';
                windEl.textContent = Math.round(data.wind.speed * 3.6) + ' km/h';
                feelsLikeEl.textContent = Math.round(data.main.feels_like) + '°C';
                
                // Show weather info
                weatherInfo.style.display = 'block';
                
            } catch (error) {
                console.log('Error:', error);
                errorMsg.style.display = 'block';
                weatherInfo.style.display = 'none';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Search button click
        searchBtn.addEventListener('click', () => {
            const city = cityInput.value.trim();
            if (city) {
                getWeather(city);
            }
        });
        
        // Press Enter key
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });
        
        // Load default city on page load
        getWeather('Nairobi');
        
        // Process note for portfolio:
        console.log(`
        ?? BUGS I FIXED IN THIS APP:
        1. API key didn't work at first - forgot to activate it
        2. Response.ok check missing - kept getting errors
        3. Kelvin to Celsius conversion - math was wrong
        4. Wind speed units - needed km/h conversion
        
        ? LESSON LEARNED:
        Always check API response status before processing data!
        `);
    </script>
</body>
</html>
